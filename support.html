<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x.swt - تواصل مع الإدارة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f7f8fa,#edf1f5);color:#222}
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:16px 14px 40px}
    .title{font-size:24px;font-weight:bold;margin-bottom:14px}
    .card{background:#fff;border:1px solid #e6e6e6;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
    .field{margin-bottom:12px}
    label{display:block;font-weight:bold;font-size:14px;margin-bottom:7px}
    input,textarea,select{width:100%;padding:14px;border:1px solid #d4d7dd;border-radius:14px;font-size:15px;background:#fff;outline:none}
    textarea{min-height:130px;resize:vertical}
    .btn{width:100%;padding:14px;border:none;border-radius:16px;background:linear-gradient(135deg,#dfe3e8,#ffffff);font-weight:bold;font-size:16px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.07);margin-top:8px}
  </style>
</head>
<body>
  <div class="app">
    <div class="title">تواصل مع الإدارة</div>

    <div class="card">
      <div class="field">
        <label>نوع المشكلة</label>
        <select id="subject">
          <option value="مشكلة إيداع">مشكلة إيداع</option>
          <option value="مشكلة سحب">مشكلة سحب</option>
          <option value="مشكلة حساب">مشكلة حساب</option>
          <option value="استفسار عام">استفسار عام</option>
        </select>
      </div>

      <div class="field">
        <label>الرسالة</label>
        <textarea id="message" placeholder="اكتب رسالتك هنا"></textarea>
      </div>

      <button class="btn" onclick="sendSupport()">إرسال</button>
    </div>
  </div>

  <script>
    async function sendSupport(){
      const user = await ensureLoggedIn();
      if(!user) return;

      const subject = document.getElementById("subject").value;
      const message = document.getElementById("message").value.trim();

      if(!message){
        alert("اكتب الرسالة");
        return;
      }

      const { error } = await supabaseClient.from("support_tickets").insert({
        user_id: user.id,
        subject,
        message,
        status: "open"
      });

      if(error){
        alert(error.message);
        return;
      }

      alert("تم إرسال رسالتك إلى الإدارة");
      document.getElementById("message").value = "";
    }

    ensureLoggedIn();
  </script>
</body>
</html>
