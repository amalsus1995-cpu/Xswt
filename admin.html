<!doctype html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>x.swt Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="supabase.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:tahoma;
background:#f4f6f9;
}

.container{
max-width:430px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.field{
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:#e5e7eb;
font-weight:bold;
cursor:pointer;
width:100%;
}

.user-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.small{
font-size:12px;
color:#777;
}

.badge{
padding:4px 8px;
border-radius:8px;
font-size:12px;
background:#f1f5f9;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
لوحة الأدمن
</div>

<button onclick="logoutUser()">
تسجيل الخروج
</button>

</div>

<div class="card">

<div class="title">
البحث عن مستخدم
</div>

<input id="searchEmail" placeholder="ادخل ايميل المستخدم">

<button onclick="findUser()">
بحث
</button>

<div id="userResult"></div>

</div>

<div class="card">

<div class="title">
إضافة او خصم نقاط
</div>

<input id="pointsEmail" placeholder="ايميل المستخدم">

<input id="pointsAmount" type="number" placeholder="عدد النقاط">

<select id="pointsAction">

<option value="add">اضافة</option>

<option value="deduct">خصم</option>

</select>

<button onclick="adjustPoints()">
تنفيذ
</button>

</div>

<div class="card">

<div class="title">
حظر الحساب
</div>

<input id="banEmail" placeholder="ايميل المستخدم">

<select id="banAction">

<option value="active">فك الحظر</option>

<option value="banned">حظر</option>

</select>

<button onclick="changeStatus()">
حفظ
</button>

</div>

<div class="card">

<div class="title">
طلبات الإيداع
</div>

<div id="depositList">
جاري التحميل...
</div>

</div>

<div class="card">

<div class="title">
طلبات السحب
</div>

<div id="withdrawList">
جاري التحميل...
</div>

</div>

<div class="card">

<div class="title">
طلبات KYC
</div>

<div id="kycList">
جاري التحميل...
</div>

</div>

<div class="card">

<div class="title">
رسائل الدعم
</div>

<div id="supportList">
جاري التحميل...
</div>

</div>

</div>

<script>

async function ensureAdmin(){

const user = await ensureLoggedIn()

if(!user)return

const profile = await getMyProfile()

if(profile.role !== "admin"){

alert("ليس لديك صلاحية")

window.location.href="index.html"

}

}

async function findUser(){

await ensureAdmin()

const email = document.getElementById("searchEmail").value

const {data} = await supabaseClient

.from("profiles")

.select("*")

.eq("email",email)

.single()

if(!data){

document.getElementById("userResult").innerHTML="المستخدم غير موجود"

return

}

const {data:wallet}=await supabaseClient

.from("wallets")

.select("*")

.eq("user_id",data.id)

.single()

document.getElementById("userResult").innerHTML=

`

<div class="user-item">

<b>${data.full_name}</b>

<div class="small">UID: ${data.uid}</div>

<div class="small">الحالة: ${data.account_status}</div>

<div class="small">الرصيد: ${wallet?.balance_points || 0}</div>

</div>

`

}

async function adjustPoints(){

await ensureAdmin()

const email=document.getElementById("pointsEmail").value

const amount=Number(document.getElementById("pointsAmount").value)

const action=document.getElementById("pointsAction").value

const {data}=await supabaseClient

.from("profiles")

.select("id")

.eq("email",email)

.single()

if(!data)return alert("المستخدم غير موجود")

const {data:wallet}=await supabaseClient

.from("wallets")

.select("*")

.eq("user_id",data.id)

.single()

let newBalance=wallet.balance_points

if(action==="add") newBalance+=amount

else newBalance-=amount

await supabaseClient

.from("wallets")

.update({balance_points:newBalance})

.eq("user_id",data.id)

alert("تم التعديل")

}

async function changeStatus(){

await ensureAdmin()

const email=document.getElementById("banEmail").value

const status=document.getElementById("banAction").value

await supabaseClient

.from("profiles")

.update({account_status:status})

.eq("email",email)

alert("تم التحديث")

}

async function loadDeposits(){

const {data}=await supabaseClient

.from("deposits")

.select("*")

.order("created_at",{ascending:false})

.limit(20)

let html=""

data.forEach(d=>{

html+=`

<div class="user-item">

<div>المبلغ: ${d.amount_usdt}</div>

<div class="small">${d.status}</div>

<button onclick="approveDeposit('${d.id}','${d.user_id}','${d.points}')">

قبول

</button>

<button onclick="rejectDeposit('${d.id}')">

رفض

</button>

</div>

`

})

document.getElementById("depositList").innerHTML=html

}

async function approveDeposit(id,user,points){

const {data:wallet}=await supabaseClient

.from("wallets")

.select("*")

.eq("user_id",user)

.single()

let newBalance=wallet.balance_points+points

let newPrincipal=wallet.principal_points+points

await supabaseClient

.from("wallets")

.update({

balance_points:newBalance,

principal_points:newPrincipal

})

.eq("user_id",user)

await supabaseClient

.from("deposits")

.update({status:"confirmed"})

.eq("id",id)

alert("تم قبول الإيداع")

loadDeposits()

}

async function rejectDeposit(id){

await supabaseClient

.from("deposits")

.update({status:"rejected"})

.eq("id",id)

loadDeposits()

}

async function loadWithdraws(){

const {data}=await supabaseClient

.from("withdraws")

.select("*")

.order("created_at",{ascending:false})

.limit(20)

let html=""

data.forEach(w=>{

html+=`

<div class="user-item">

<div>${w.points} نقطة</div>

<div class="small">${w.status}</div>

<button onclick="approveWithdraw('${w.id}','${w.user_id}','${w.points}')">

قبول

</button>

<button onclick="rejectWithdraw('${w.id}')">

رفض

</button>

</div>

`

})

document.getElementById("withdrawList").innerHTML=html

}

async function approveWithdraw(id,user,points){

const {data:wallet}=await supabaseClient

.from("wallets")

.select("*")

.eq("user_id",user)

.single()

let newBalance=wallet.balance_points-points

await supabaseClient

.from("wallets")

.update({balance_points:newBalance})

.eq("user_id",user)

await supabaseClient

.from("withdraws")

.update({status:"approved"})

.eq("id",id)

alert("تم السحب")

loadWithdraws()

}

async function rejectWithdraw(id){

await supabaseClient

.from("withdraws")

.update({status:"rejected"})

.eq("id",id)

loadWithdraws()

}

async function loadKyc(){

const {data}=await supabaseClient

.from("kyc_requests")

.select("*")

.limit(10)

let html=""

data.forEach(k=>{

html+=`

<div class="user-item">

<div>${k.full_name}</div>

<button onclick="approveKyc('${k.id}','${k.user_id}')">

قبول

</button>

<button onclick="rejectKyc('${k.id}','${k.user_id}')">

رفض

</button>

</div>

`

})

document.getElementById("kycList").innerHTML=html

}

async function approveKyc(id,user){

await supabaseClient

.from("kyc_requests")

.update({status:"approved"})

.eq("id",id)

await supabaseClient

.from("profiles")

.update({kyc_status:"approved"})

.eq("id",user)

loadKyc()

}

async function rejectKyc(id,user){

await supabaseClient

.from("kyc_requests")

.update({status:"rejected"})

.eq("id",id)

await supabaseClient

.from("profiles")

.update({kyc_status:"rejected"})

.eq("id",user)

loadKyc()

}

async function loadSupport(){

const {data}=await supabaseClient

.from("support_tickets")

.select("*")

.limit(10)

let html=""

data.forEach(s=>{

html+=`

<div class="user-item">

<div>${s.subject}</div>

<div class="small">${s.message}</div>

</div>

`

})

document.getElementById("supportList").innerHTML=html

}

async function init(){

await ensureAdmin()

loadDeposits()

loadWithdraws()

loadKyc()

loadSupport()

}

init()

</script>

</body>

</html>
