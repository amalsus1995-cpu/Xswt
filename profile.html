<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x.swt - ملفي الشخصي</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f7f8fa,#edf1f5);color:#222}
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:16px 14px 90px}
    .card{background:rgba(255,255,255,.95);border:1px solid #e6e6e6;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.08);margin-bottom:14px}
    .top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .avatar{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#eef2f5,#dfe5ea);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold}
    .name{font-size:22px;font-weight:bold}
    .muted{color:#666;font-size:13px}
    .menu-btn{width:100%;text-align:right;border:none;background:#fff;padding:16px;border-radius:18px;font-size:15px;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,.05);margin-bottom:10px;cursor:pointer}
    .status-box{margin-top:10px;padding:12px;border-radius:14px;background:#f8fafc;font-size:14px}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(430px, calc(100% - 20px));background:rgba(255,255,255,.94);border:1px solid #e8e8e8;border-radius:24px;display:flex;justify-content:space-around;padding:12px 8px;box-shadow:0 16px 35px rgba(0,0,0,.12)}
    .nav-item{text-align:center;font-size:12px;color:#666;text-decoration:none;flex:1}
    .nav-item.active{color:#111;font-weight:bold}
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="top">
        <div class="avatar">👤</div>
        <div>
          <div class="name" id="nameText">المستخدم</div>
          <div class="muted" id="uidText">UID: ----</div>
          <div class="muted" id="emailText">email@example.com</div>
        </div>
      </div>
      <div class="status-box" id="kycStatusBox">حالة التحقق: غير موثق</div>
    </div>

    <button class="menu-btn" onclick="location.href='change-password.html'">تعديل كلمة المرور</button>
    <button class="menu-btn" onclick="location.href='kyc.html'">التحقق من الهوية</button>
    <button class="menu-btn" onclick="location.href='about.html'">من نحن</button>
    <button class="menu-btn" onclick="location.href='support.html'">تواصل مع الإدارة</button>
    <button class="menu-btn" onclick="copyReferral()">نسخ رابط الدعوة</button>
    <button class="menu-btn" onclick="logoutUser()">تسجيل الخروج</button>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item">الرئيسية</a>
    <a href="market.html" class="nav-item">السوق</a>
    <a href="sync.html" class="nav-item">الكود</a>
    <a href="assets.html" class="nav-item">الأصول</a>
    <a href="profile.html" class="nav-item active">حسابي</a>
  </div>

  <script>
    let myProfile = null;

    function kycText(status){
      if(status === "approved") return "حالة التحقق: تم التحقق من الهوية";
      if(status === "pending") return "حالة التحقق: قيد المراجعة";
      if(status === "rejected") return "حالة التحقق: مرفوض";
      return "حالة التحقق: غير موثق";
    }

    async function loadProfile(){
      const user = await ensureLoggedIn();
      if(!user) return;

      myProfile = await getMyProfile();
      if(!myProfile) return;

      document.getElementById('nameText').textContent = myProfile.full_name || 'المستخدم';
      document.getElementById('uidText').textContent = 'UID: ' + (myProfile.uid || '----');
      document.getElementById('emailText').textContent = myProfile.email || '';
      document.getElementById('kycStatusBox').textContent = kycText(myProfile.kyc_status);
    }

    function copyReferral(){
      if(!myProfile?.referral_code){
        alert('لا يوجد كود دعوة حالياً');
        return;
      }
      const link = location.origin + location.pathname.replace('profile.html','register.html') + '?ref=' + myProfile.referral_code;
      navigator.clipboard.writeText(link);
      alert('تم نسخ رابط الدعوة');
    }

    loadProfile();
  </script>
</body>
</html>
