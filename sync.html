<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x.swt - إدخال الكود</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f7f8fa,#edf1f5);color:#222}
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:16px 14px 90px}
    .hero{
      border-radius:26px;
      padding:20px;
      background:
        linear-gradient(rgba(255,255,255,.90),rgba(255,255,255,.90)),
        url('a_digital_promotional_banner_for_x.swt_features_st.png') center/cover no-repeat;
      border:1px solid #e6e6e6;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
      margin-bottom:14px;
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
    }
    .title{font-size:22px;font-weight:bold;margin-bottom:8px}
    .sub{color:#666;font-size:14px;line-height:1.7}
    .card{background:#fff;border:1px solid #e6e6e6;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
    .field{margin-bottom:12px}
    input{width:100%;padding:15px;border:1px solid #d4d7dd;border-radius:15px;font-size:15px;outline:none}
    .btn{width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,#dfe3e8,#ffffff);font-weight:bold;font-size:16px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.07)}
    .btn:disabled{opacity:.6}
    .small-card{background:#fff;border:1px solid #e6e6e6;border-radius:18px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.05);margin-top:12px}
    .msg{margin-top:10px;padding:12px;border-radius:12px;font-size:14px;display:none}
    .msg.ok{display:block;background:#eaf8ef;color:#166534}
    .msg.err{display:block;background:#fdecec;color:#b42318}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(430px, calc(100% - 20px));background:rgba(255,255,255,.94);border:1px solid #e8e8e8;border-radius:24px;display:flex;justify-content:space-around;padding:12px 8px;box-shadow:0 16px 35px rgba(0,0,0,.12)}
    .nav-item{text-align:center;font-size:12px;color:#666;text-decoration:none;flex:1}
    .nav-item.active{color:#111;font-weight:bold}
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="title">إدخال الكود اليومي</div>
      <div class="sub">أدخل كود اليوم لتفعيل مكافأة النقاط اليومية. الكود يستخدم مرة واحدة فقط كل يوم.</div>
    </div>

    <div class="card">
      <div class="field">
        <input id="dailyCode" type="text" placeholder="يرجى إدخال كود اليوم">
      </div>
      <button id="claimBtn" class="btn" onclick="claimCode()">تفعيل الأرباح</button>
      <div id="message" class="msg"></div>
    </div>

    <div class="small-card">
      <strong>ملاحظة:</strong>
      <div style="margin-top:8px;color:#666;font-size:14px;line-height:1.8">
        كل 15 نقطة = 1 نقطة مكافأة<br>
        الميزة تعمل مرة واحدة يومياً فقط
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item">الرئيسية</a>
    <a href="market.html" class="nav-item">السوق</a>
    <a href="sync.html" class="nav-item active">الكود</a>
    <a href="assets.html" class="nav-item">الأصول</a>
    <a href="profile.html" class="nav-item">حسابي</a>
  </div>

  <script>
    function showMessage(text, type){
      const box = document.getElementById("message");
      box.className = "msg " + type;
      box.textContent = text;
    }

    async function claimCode(){
      const user = await ensureLoggedIn();
      if(!user) return;

      const code = document.getElementById("dailyCode").value.trim().toUpperCase();
      const btn = document.getElementById("claimBtn");

      if(!code){
        showMessage("اكتب الكود أولاً", "err");
        return;
      }

      btn.disabled = true;
      btn.textContent = "جاري التفعيل...";

      const { data, error } = await supabaseClient.rpc("claim_daily_code", {
        p_user_id: user.id,
        p_code: code
      });

      if(error){
        showMessage(error.message, "err");
        btn.disabled = false;
        btn.textContent = "تفعيل الأرباح";
        return;
      }

      showMessage("تمت إضافة " + data + " نقطة بنجاح", "ok");
      btn.disabled = false;
      btn.textContent = "تفعيل الأرباح";
      document.getElementById("dailyCode").value = "";
    }

    ensureLoggedIn();
  </script>
</body>
</html>
