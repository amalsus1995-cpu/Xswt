<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>x.swt - الرئيسية</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="supabase.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Tahoma,Arial,sans-serif;
background:linear-gradient(180deg,#f8f9fb,#edf1f5);
color:#222;
}

.app{
max-width:430px;
margin:0 auto;
min-height:100vh;
padding:14px 14px 95px;
background:
linear-gradient(rgba(255,255,255,.90),rgba(255,255,255,.90)),
url('a_pair_of_digital_promotional_images_for_x.swt_are.png') center top/cover no-repeat;
background-attachment:fixed;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:52px;
height:52px;
border-radius:16px;
object-fit:cover;
background:#fff;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.icon-btn{
border:none;
background:#fff;
width:44px;
height:44px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
cursor:pointer;
font-size:18px;
}

.card{
background:rgba(255,255,255,.95);
border:1px solid #e6e6e6;
border-radius:22px;
padding:16px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
margin-bottom:14px;
}

.balance{
font-size:34px;
font-weight:bold;
margin:10px 0 6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:14px;
}

.mini{
background:#fff;
border-radius:18px;
padding:14px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

.section-title{
margin:10px 2px 12px;
}

.action-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.action-btn{
border:none;
border-radius:18px;
padding:16px 12px;
font-size:15px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#ffffff,#eef2f5);
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

.admin-btn{
background:#111;
color:#fff;
}

.bottom-nav{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:10px;
width:min(430px, calc(100% - 20px));
background:rgba(255,255,255,.96);
border-radius:24px;
display:flex;
justify-content:space-around;
padding:12px 8px;
box-shadow:0 16px 35px rgba(0,0,0,.12);
}

.nav-item{
text-align:center;
font-size:12px;
color:#666;
text-decoration:none;
flex:1;
}

.nav-item.active{
color:#111;
font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<div class="brand">
<img src="logo.png">
<div>
<h1>x.swt</h1>
<p>تداول مع منصتنا لتكسب</p>
</div>
</div>

<button class="icon-btn" onclick="logoutUser()">خروج</button>
</div>

<div class="card">
<div class="balance" id="balanceText">0 نقطة</div>
<div id="uidText">UID: ----</div>
</div>

<div class="section-title">
<h2>العمليات السريعة</h2>
</div>

<div class="action-grid">

<button class="action-btn" onclick="location.href='assets.html'">الأصول</button>
<button class="action-btn" onclick="location.href='profile.html'">ملفي الشخصي</button>
<button class="action-btn" onclick="location.href='market.html'">أسعار السوق</button>
<button class="action-btn" onclick="location.href='sync.html'">إدخال الكود</button>
<button class="action-btn" onclick="location.href='team.html'">الفريق</button>
<button class="action-btn" onclick="location.href='support.html'">الدعم</button>

<!-- زر الادمن -->
<button class="action-btn admin-btn" id="adminBtn" style="display:none"
onclick="location.href='admin.html'">
لوحة الأدمن
</button>

</div>

</div>

<div class="bottom-nav">
<a href="index.html" class="nav-item active">الرئيسية</a>
<a href="market.html" class="nav-item">السوق</a>
<a href="sync.html" class="nav-item">الكود</a>
<a href="assets.html" class="nav-item">الأصول</a>
<a href="team.html" class="nav-item">الفريق</a>
</div>

<script>

async function loadHome(){

const user = await ensureLoggedIn();
if(!user) return;

const profile = await getMyProfile();
const wallet = await getMyWallet();

if(profile){

document.getElementById("uidText").textContent =
"UID: " + (profile.uid || "----");

if(profile.email === "am.alsus1995@gmail.com"){
document.getElementById("adminBtn").style.display="block";
}

}

if(wallet){
document.getElementById("balanceText").textContent =
money(wallet.balance_points) + " دولار";
}

}

loadHome();

</script>

</body>
</html>
